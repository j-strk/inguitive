<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>inguitive + HTMX</title>
        <!-- HTMX -->
        <script src="https://unpkg.com/htmx.org@1.9.6"></script>
        <!-- Tailwind CSS -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- Inter Font -->
        <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
        <!-- Configure Tailwind to use Inter as default sans-serif -->
        <style type="text/tailwindcss">
            @theme {
                --font-sans: Inter, sans-serif;
            }
        </style>
    </head>
    <body class="min-h-screen">
        {{ content | safe }}  <!-- WICHTIG: | safe, damit HTML nicht escaped wird! -->
        <!-- Dummy target for HTMX POST requests -->
        <div id="hx-target" style="display: none;"></div>
    </body>
</html>
